<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            text-align: center;
        }
        .calculator {
            width: 300px;
            margin: 100px auto;
            background-color: #1a1717;
            padding: 10px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 10px;
            font-size: 18px;
            text-align: right;
        }
        
        button {
            width: 50px;
            height: 50px;
            font-size: 18px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="calculator">
    <input type="text" id="display" readonly>

    <div>
        <br><button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('+')">+</button><br>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('/')">/</button><br>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('*')">*</button><br>
        <button class="equal" style="background-color:green;" onclick="calculate()">=</button>
        <button onclick="appendValue('0')">0</button>
        <button style="background-color:red;" onclick="backspace()">⌫</button>
        
        <button onclick="appendValue('-')">-</button>
    </div>
</div>
<script>
    let display = document.getElementById('display');
    function appendValue(value) {
        display.value += value;
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = 'Error';
        }
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }
</script>

</body>
</html>
